<!-- index.html -->
<!DOCTYPE html>
<html>
<head>
  <title>Lobbies</title>
</head>
<body>
  <h1>Create Lobby</h1>
  <input id="text" placeholder="Leave Empty for Open" />
  <button onclick="create_lobby()">Create Lobby</button><br>
  <input id="joinbox" placeholder="Lobby Id"/>
  <button onclick="join_lobby()">Join Lobby</button><br>
  <pre id="out"></pre>
  <script>
    async function create_lobby() {
      
      const text = document.getElementById("text").value;
      if (!text) {
        await fetch("/service/lobster/api/create-lobby", {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json"},
          body: JSON.stringify({text})
        });
      } else {
        await fetch("/service/lobster/api/create-lobby-invite", {
          method: "POST",
          credentials: "include",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({text})
        });
      }
      load_lobbies()
    }

  async function join_lobby() {
    const id = document.getElementById("joinbox").value;
    await fetch("/service/lobster/api/join-lobby", {
      method:"POST",
      credentials: "include",
      headers: {
        "Content-Type":"application/json"
      },
      body: JSON.stringify({id})
    })
  }

    async function load_lobbies() {
      const res = await fetch("/service/lobster/api/lobbies", {
        credentials:"include"
      });
      document.getElementById("out").textContent =
        JSON.stringify(await res.json(), null, 2);
    }



    load_lobbies();
  </script>
</body>
</html>
