<!-- index.html -->
<!DOCTYPE html>
<html>
<head>
  <title>Comments</title>
</head>
<body>
  <h1>Comments</h1>
  <input id="text" placeholder="Username" />
  <button onclick="sign_in()">Send</button>

  <pre id="out"></pre>

  <script>
    async function send() {
      const text = document.getElementById("text").value;
      await fetch("/accountant/sign-in", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({text})
      });
      load();
    }

    async function load() {
      const res = await fetch("/ui/comments");
      document.getElementById("out").textContent =
        JSON.stringify(await res.json(), null, 2);
    }

    load();
  </script>
</body>
</html>
